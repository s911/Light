version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: stage-lighting-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.5-php8.2-apache
    container_name: stage-lighting-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${WORDPRESS_PORT}:80"
    volumes:
      - ./wp-content/themes/stage-lighting:/var/www/html/wp-content/themes/stage-lighting
      - ./wp-content/plugins/stage-lighting-b2b:/var/www/html/wp-content/plugins/stage-lighting-b2b
      - ./wp-content/plugins/stage-lighting-setup:/var/www/html/wp-content/plugins/stage-lighting-setup
      - wp_data:/var/www/html

  wpcli:
    image: wordpress:cli-php8.2
    container_name: stage-lighting-wpcli
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./wp-content/themes/stage-lighting:/var/www/html/wp-content/themes/stage-lighting
      - ./wp-content/plugins/stage-lighting-b2b:/var/www/html/wp-content/plugins/stage-lighting-b2b
      - ./wp-content/plugins/stage-lighting-setup:/var/www/html/wp-content/plugins/stage-lighting-setup
      - wp_data:/var/www/html
    entrypoint: ["sleep", "infinity"]

volumes:
  db_data:
  wp_data:
